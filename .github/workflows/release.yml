name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read metadata
        id: meta
        run: |
          VERSION=$(jq -r '."version-name"' metadata.json)
          UUID=$(jq    -r '.uuid'           metadata.json)
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "uuid=$UUID"         >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"      >> "$GITHUB_OUTPUT"
          echo "zip=${UUID}.zip"    >> "$GITHUB_OUTPUT"

      - name: Install GLib tools
        run: sudo apt-get install -y --no-install-recommends libglib2.0-bin

      - name: Compile GSettings schema
        run: glib-compile-schemas schemas/

      - name: Build zip
        run: |
          zip -r "${{ steps.meta.outputs.zip }}" \
            extension.js \
            prefs.js \
            metadata.json \
            stylesheet.css \
            LICENSE \
            schemas/ \
            --exclude "schemas/gschemas.compiled"

      - name: Run shexli static analysis
        run: |
          pip install shexli -q
          RESULT=$(shexli "${{ steps.meta.outputs.zip }}" --format json)
          echo "$RESULT" | python3 -m json.tool
          ERRORS=$(echo "$RESULT" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['summary']['severity_counts'].get('error', 0))")
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::shexli found $ERRORS error(s) — blocking release"
            exit 1
          fi
          echo "shexli: no errors"

      - name: Delete existing release for this version (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists — deleting it first"
            gh release delete "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --yes \
              --cleanup-tag
          else
            echo "No existing release for $TAG"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ZIP="${{ steps.meta.outputs.zip }}"
          cat > release_notes.md << EOF
          ## Modern Volume Mixer ${TAG}

          Built automatically from \`main\`. Install with:

          \`\`\`bash
          gnome-extensions install ${ZIP}
          \`\`\`
          EOF
          gh release create "$TAG" \
            --repo  "$GITHUB_REPOSITORY" \
            --title "Modern Volume Mixer $TAG" \
            --notes-file release_notes.md \
            "$ZIP"
